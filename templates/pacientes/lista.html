{% extends 'base_dashboard.html' %}
{% block title %}Pacientes — NutricionClick{% endblock %}
{% block page_title %}Pacientes{% endblock %}

{% block topbar_actions %}
<a href="{% url 'paciente_nuevo' %}" class="bg-[#7A5AB4] text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-[#5E4694] transition">+ Nuevo paciente</a>
{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
  <div class="flex items-center gap-1 mb-4 border-b border-gray-200">
    <a href="?activo=1"
       class="px-4 py-2 text-sm font-semibold border-b-2 -mb-px transition
              {% if activo_filter == '1' %}border-[#7A5AB4] text-[#7A5AB4]{% else %}border-transparent text-gray-400 hover:text-gray-600{% endif %}">
      Activos
    </a>
    <a href="?activo=0"
       class="px-4 py-2 text-sm font-semibold border-b-2 -mb-px transition
              {% if activo_filter == '0' %}border-[#7A5AB4] text-[#7A5AB4]{% else %}border-transparent text-gray-400 hover:text-gray-600{% endif %}">
      Inactivos
    </a>
  </div>
  <div class="mb-4">
    <input
      type="text"
      name="q"
      value="{{ q }}"
      placeholder="Buscar por nombre o apellido..."
      class="w-full md:w-80 px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#7A5AB4]"
      hx-get="{% url 'pacientes_lista' %}"
      hx-trigger="keyup changed delay:300ms"
      hx-target="#lista-pacientes"
      hx-include="[name='q'], [name='activo']"
    >
    <input type="hidden" name="activo" value="{{ activo_filter }}">
  </div>
  <div id="lista-pacientes">
    {% include 'pacientes/_lista_parcial.html' %}
  </div>
</div>
{% endblock %}
