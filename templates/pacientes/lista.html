{% extends 'base.html' %}
{% block title %}Pacientes — NutriLink{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Pacientes</h1>
  <a href="{% url 'paciente_nuevo' %}" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition">
    + Nuevo paciente
  </a>
</div>

<!-- Búsqueda con HTMX -->
<div class="mb-4">
  <input
    type="text"
    name="q"
    value="{{ q }}"
    placeholder="Buscar por nombre o apellido..."
    class="w-full md:w-80 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
    hx-get="{% url 'pacientes_lista' %}"
    hx-trigger="keyup changed delay:300ms"
    hx-target="#lista-pacientes"
    hx-include="[name='q']"
  >
</div>

<div id="lista-pacientes">
  {% include 'pacientes/_lista_parcial.html' %}
</div>
{% endblock %}
