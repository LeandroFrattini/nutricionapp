{% extends 'base.html' %}
{% block title %}Contraseña restablecida — NutricionClick{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-160px)] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <span class="font-display text-3xl font-bold text-[#1B4332]">NutricionClick</span>
    </div>

    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-8 text-center">

      <!-- Tilde animado -->
      <div class="flex justify-center mb-5">
        <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
      </div>

      <h1 class="text-xl font-semibold text-gray-900 mb-3">Contraseña actualizada</h1>
      <p class="text-sm text-gray-500 mb-6">
        Tu contraseña fue restablecida con éxito. Ya podés iniciar sesión con tu nueva contraseña.
      </p>

      <a href="{% url 'login' %}"
        class="inline-block btn-primary px-8 py-3 rounded-xl font-semibold text-sm">
        Iniciar sesión
      </a>
    </div>
  </div>
</div>
{% endblock %}
