{% extends 'base.html' %}
{% block title %}Ingresar — NutriLink{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Ingresar</h1>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold hover:bg-green-700 transition">
        Ingresar
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      ¿No tenés cuenta? <a href="{% url 'registro' %}" class="text-green-600 hover:underline">Registrarse</a>
    </p>
  </div>
</div>
{% endblock %}
