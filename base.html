<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NutriLink{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-up { animation: fadeUp 0.6s ease forwards; }
    .animate-fade-up-delay { animation: fadeUp 0.6s ease 0.15s forwards; opacity: 0; }
    .animate-fade-up-delay-2 { animation: fadeUp 0.6s ease 0.3s forwards; opacity: 0; }
    .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
    .card-hover {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    .btn-primary {
      background: #1B4332;
      color: white;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .btn-primary:hover {
      background: #14532d;
      transform: translateY(-1px);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 700: '#15803d', 900: '#14532d' },
            cream: '#FAFAF7',
            bark: '#1B4332',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#FAFAF7] min-h-screen text-gray-900">

  <!-- Navbar -->
  <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{% url 'home' %}" class="flex items-center gap-2 group">
        <span class="text-[#1B4332] font-display text-xl font-bold tracking-tight group-hover:opacity-80 transition">NutriLink</span>
      </a>
      <div class="flex items-center gap-6 text-sm">
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}" class="text-gray-500 hover:text-gray-900 transition">Dashboard</a>
          <a href="{% url 'pacientes_lista' %}" class="text-gray-500 hover:text-gray-900 transition">Pacientes</a>
